// ══════════════════════════════════════════════════════════ EXAM RUN
let examRun = null;
function startExamRun(){
  const pool = [];
  CHAPTERS.forEach((ch,ci)=>{
    const n = examConfig.perChapter[ci]||0;
    if(!n) return;
    const all = [];
    ch.exercises.forEach(ex=>ex.questions.forEach((q,qi)=>all.push({ch,ci,ex,q,qi})));
    all.sort(()=>Math.random()-.5);
    pool.push(...all.slice(0,n));
  });
  if(!pool.length){toast('Seleziona almeno una domanda!','⚠️');return}
  pool.sort(()=>Math.random()-.5);
  examRun = {
    items:pool,
    i:0,
    ans:new Array(pool.length).fill(null),
    time:examConfig.mins*60,
    interval:null,
    done:false
  };
  closeOverlay('examConfigOverlay');
  document.getElementById('examRunning').classList.add('open');
  examRun.interval = setInterval(()=>{
    if(!examRun) return;
    examRun.time--;
    updateExamTimer();
    if(examRun.time<=0){clearInterval(examRun.interval);finishExam()}
  }, 1000);
  renderExamRun();
}
function updateExamTimer(){
  const el = document.getElementById('examTimer');
  if(!el) return;
  const m = Math.floor(examRun.time/60), s = examRun.time%60;
  el.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  el.classList.toggle('warn', examRun.time<=60);
}
function renderExamRun(){
  const el = document.getElementById('examRunning');
  const total = examRun.items.length;
  const answered = examRun.ans.filter(a=>a!==null).length;

  if(examRun.done){
    const byCh = {};
    examRun.items.forEach((it,i)=>{
      if(!byCh[it.ci]) byCh[it.ci]={ch:it.ch,ci:it.ci,ok:0,tot:0};
      byCh[it.ci].tot++;
      if(examRun.ans[i]===it.q.corretta) byCh[it.ci].ok++;
    });
    const totOk = examRun.items.filter((it,i)=>examRun.ans[i]===it.q.corretta).length;
    const totPct = Math.round(totOk/total*100);
    const emoji = totPct>=80?'🏆':totPct>=65?'🌟':totPct>=50?'👍':'💪';
    const msg = totPct>=80?'Ottimo! Sei pronto/a!':totPct>=65?'Bene! Ripassa i punti deboli.':totPct>=50?'Buono. Serve ancora pratica.':'Coraggio, rivedi la teoria!';
    const col = totPct>=65?'var(--grass-dark)':totPct>=50?'var(--orange-dark)':'var(--red-dark)';

    el.innerHTML = `
      <div class="exam-top">
        <button class="modal-close" onclick="closeExam()">✕</button>
        <div style="flex:1;font-family:'Fraunces',serif;font-weight:900;font-size:18px">🏆 Risultato</div>
      </div>
      <div class="exam-body"><div class="exam-body-inner">
        <div class="quiz-result">
          <div class="quiz-result-emoji">${emoji}</div>
          <div class="quiz-result-score" style="color:${col}">${totPct}%</div>
          <div class="quiz-result-lbl">${totOk} su ${total} corrette · ${msg}</div>
        </div>

        <div class="section-head"><div class="section-title">Performance per materia</div></div>
        <div class="ch-grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">
          ${Object.values(byCh).map(c=>{
            const p = Math.round(c.ok/c.tot*100);
            const th = CH_THEME[c.ci];
            const cc = p>=70?'var(--grass-dark)':p>=50?'var(--orange-dark)':'var(--red-dark)';
            return `<div class="ch-card" style="min-height:0;cursor:default">
              <div class="ch-card-top">
                <div class="ch-card-ic" style="background:${th.bg};color:#fff;width:40px;height:40px;font-size:20px;border-radius:12px">${th.ic}</div>
                <div class="serif" style="font-size:26px;color:${cc}">${p}%</div>
              </div>
              <div class="ch-card-title" style="font-size:15px">${c.ch.title}</div>
              <div class="ch-card-meta">${c.ok}/${c.tot}</div>
              <div class="ch-card-bar" style="margin-top:4px"><div class="ch-card-fill" style="width:${p}%;background:${cc}"></div></div>
            </div>`;
          }).join('')}
        </div>

        ${examRun.items.some((it,i)=>examRun.ans[i]!==it.q.corretta) ? `
        <div class="section-head"><div class="section-title">Da rivedere</div></div>
        <div class="teoria-grid">
          ${examRun.items.map((it,i)=>examRun.ans[i]!==it.q.corretta ? `
            <div class="tcard">
              <div class="tcard-head">
                <div class="tcard-dot" style="background:${CH_THEME[it.ci].solid}"></div>
                <div class="tcard-title" style="font-size:15px">${it.q.testo}</div>
              </div>
              <div class="tcard-body">
                <div style="color:var(--grass-dark);font-weight:800">✓ ${it.q.opzioni[it.q.corretta]}</div>
                ${examRun.ans[i]!==null?`<div style="color:var(--red-dark);font-weight:800">✗ ${it.q.opzioni[examRun.ans[i]]}</div>`:'<div style="color:var(--sub);font-style:italic">Nessuna risposta</div>'}
                <div style="margin-top:6px;color:var(--sub)">${it.q.spiegazione||''}</div>
              </div>
            </div>
          ` : '').join('')}
        </div>` : ''}

        <div class="action-row" style="justify-content:center;margin-top:24px">
          <button class="action-btn primary" onclick="closeExam();openExamConfig()">🔄 Nuovo test</button>
          <button class="action-btn" onclick="closeExam()">Chiudi</button>
        </div>
      </div></div>
    `;
    return;
  }

  const item = examRun.items[examRun.i];
  const th = CH_THEME[item.ci];
  const q = item.q;
  const sel = examRun.ans[examRun.i];
  const pctFill = (answered/total)*100;

  el.innerHTML = `
    <div class="exam-top">
      <button class="modal-close" onclick="if(confirm('Uscire dal test? I progressi andranno persi.')){closeExam()}">✕</button>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:var(--sub);font-weight:900;text-transform:uppercase;letter-spacing:.08em">Domanda ${examRun.i+1}/${total}</div>
        <div class="quiz-bar" style="margin-top:4px"><div class="quiz-bar-fill" style="width:${pctFill}%;background:var(--sky)"></div></div>
      </div>
      <div class="exam-timer" id="examTimer">${String(Math.floor(examRun.time/60)).padStart(2,'0')}:${String(examRun.time%60).padStart(2,'0')}</div>
    </div>
    <div class="exam-body"><div class="exam-body-inner">
      <div style="display:inline-block;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border-radius:99px;background:${th.bg};color:#fff;margin-bottom:14px">${th.ic} ${item.ch.title}</div>
      <div class="quiz-q-text">${q.testo}</div>
      <div class="quiz-opts" style="margin-top:20px">
        ${q.opzioni.map((op,oi)=>`<button class="quiz-opt ${sel===oi?'selected':''}" onclick="selectExam(${oi})">
          <span class="quiz-opt-lbl">${['A','B','C','D'][oi]}</span><span>${op}</span>
        </button>`).join('')}
      </div>
      <div class="quiz-dots" style="margin-top:24px">${examRun.items.map((_,i)=>{
        let c='quiz-dot';
        if(i===examRun.i)c+=' curr';
        else if(examRun.ans[i]!==null)c+=' ok';
        return `<div class="${c}" onclick="examJump(${i})" title="${i+1}"></div>`;
      }).join('')}</div>
    </div></div>
    <div class="exam-footer">
      <button class="action-btn" onclick="examBack()" ${examRun.i===0?'disabled style="opacity:.4"':''}>← Indietro</button>
      ${examRun.i<total-1
        ? `<button class="action-btn primary" onclick="examNext()">Avanti →</button>`
        : `<button class="action-btn primary" style="background:var(--grass)" onclick="if(confirm('Consegnare il test?')){finishExam()}">✓ Consegna</button>`}
    </div>
  `;
}
function selectExam(oi){examRun.ans[examRun.i]=oi;renderExamRun();}
function examBack(){if(examRun.i>0){examRun.i--;renderExamRun();}}
function examNext(){if(examRun.i<examRun.items.length-1){examRun.i++;renderExamRun();}}
function examJump(i){examRun.i=i;renderExamRun();}
function finishExam(){
  if(!examRun)return;
  examRun.done=true;
  clearInterval(examRun.interval);examRun.interval=null;
  const ok = examRun.items.filter((it,i)=>examRun.ans[i]===it.q.corretta).length;
  const pct = Math.round(ok/examRun.items.length*100);
  const hist = lsGet('examHist', []);
  hist.unshift({date:new Date().toLocaleDateString('it'), score:pct, ok, tot:examRun.items.length, ts:Date.now()});
  if(hist.length>20) hist.length=20;
  lsSet('examHist', hist);
  addXP(pct>=80?200:pct>=60?100:50);
  renderExamRun();
}
function closeExam(){
  document.getElementById('examRunning').classList.remove('open');
  if(examRun && examRun.interval){clearInterval(examRun.interval)}
  examRun=null;
  if(view==='home')renderHome();
}

// ══════════════════════════════════════════════════════════ STATS
function openStats(){
  const sr = getSR();
  const t = today();
  let seen=0,totOk=0,totKo=0;
  const byCh = CHAPTERS.map((ch,i)=>({ch,ci:i,ok:0,ko:0,tot:0}));
  const hard = [];
  CHAPTERS.forEach((ch,ci)=>ch.exercises.forEach(ex=>ex.questions.forEach((q,qi)=>{
    const d = sr[qId(ex.id,qi)];
    if(!d) return;
    seen++;
    totOk += d.ok||0;
    totKo += d.ko||0;
    byCh[ci].ok += d.ok||0;
    byCh[ci].ko += d.ko||0;
    byCh[ci].tot += (d.ok||0)+(d.ko||0);
    if(d.ko>0) hard.push({q,ex,ch,ko:d.ko});
  })));
  hard.sort((a,b)=>b.ko-a.ko);
  const hardTop = hard.slice(0,5);
  const totAns = totOk+totKo;
  const pctAcc = totAns?Math.round(totOk/totAns*100):0;
  const due = getDueQuestions().length;

  const hist = lsGet('examHist', []);
  const histData = hist.slice(0,8).reverse();

  const el = document.getElementById('statsOverlay');
  el.innerHTML = `<div class="modal" style="max-width:680px">
    <div class="modal-head">
      <div><div class="modal-title">📊 I tuoi progressi</div>
        <div class="modal-sub">Tutto in un colpo d'occhio</div></div>
      <button class="modal-close" onclick="closeOverlay('statsOverlay')">✕</button>
    </div>

    <div class="stat-bar" style="margin-bottom:20px">
      <div class="stat"><div class="stat-ic" style="background:var(--sky-soft);color:var(--sky-dark)">👁️</div>
        <div class="stat-body"><div class="stat-val">${seen}</div><div class="stat-lbl">dom. viste</div></div></div>
      <div class="stat"><div class="stat-ic" style="background:${pctAcc>=70?'var(--grass-soft)':'var(--orange-soft)'};color:${pctAcc>=70?'var(--grass-dark)':'var(--orange-dark)'}">🎯</div>
        <div class="stat-body"><div class="stat-val">${pctAcc}%</div><div class="stat-lbl">precisione</div></div></div>
      <div class="stat"><div class="stat-ic" style="background:${due?'var(--red-soft)':'var(--grass-soft)'};color:${due?'var(--red-dark)':'var(--grass-dark)'}">🔁</div>
        <div class="stat-body"><div class="stat-val">${due}</div><div class="stat-lbl">da ripassare</div></div></div>
      <div class="stat"><div class="stat-ic" style="background:var(--gold-soft);color:#8A6D00">⭐</div>
        <div class="stat-body"><div class="stat-val">${getXP()}</div><div class="stat-lbl">XP</div></div></div>
    </div>

    <div style="margin-bottom:18px">
      <div class="section-title" style="font-size:16px;margin-bottom:10px">Per materia</div>
      ${byCh.filter(x=>x.tot>0).map(x=>{
        const p = x.tot?Math.round(x.ok/x.tot*100):0;
        const th = CH_THEME[x.ci];
        return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="width:30px;height:30px;border-radius:8px;background:${th.bg};color:#fff;display:grid;place-items:center;font-size:16px;flex-shrink:0">${th.ic}</div>
          <div style="flex:1;font-size:13px;font-weight:800;min-width:80px">${x.ch.title}</div>
          <div style="flex:2;height:10px;background:var(--line);border-radius:99px;overflow:hidden;border:1px solid var(--line-2)"><div style="height:100%;width:${p}%;background:${th.solid};border-radius:99px"></div></div>
          <div style="min-width:44px;text-align:right;font-weight:900;font-size:13px;color:${p>=70?'var(--grass-dark)':p>=50?'var(--orange-dark)':'var(--red-dark)'}">${p}%</div>
        </div>`;
      }).join('') || '<div style="color:var(--sub);font-size:13px">Rispondi ad alcune domande per vedere le statistiche!</div>'}
    </div>

    ${histData.length>=2 ? `<div style="margin-bottom:18px">
      <div class="section-title" style="font-size:16px;margin-bottom:10px">Andamento esami</div>
      ${renderMiniChart(histData)}
    </div>` : ''}

    ${hardTop.length ? `<div>
      <div class="section-title" style="font-size:16px;margin-bottom:10px">🔥 Più difficili</div>
      ${hardTop.map(h=>`<div style="background:var(--red-soft);border:2px solid #FFB3B3;border-radius:12px;padding:10px 14px;margin-bottom:6px;font-size:13px;font-weight:700">
        <span>${h.q.testo.slice(0,90)}${h.q.testo.length>90?'…':''}</span>
        <span style="float:right;color:var(--red-dark);font-weight:900">${h.ko}× errata</span>
      </div>`).join('')}
    </div>` : ''}
  </div>`;
  el.classList.add('open');
}

function renderMiniChart(data){
  const W=520, H=140, P=28;
  const scores = data.map(d=>d.score);
  const minS = Math.max(0, Math.min(...scores)-10);
  const maxS = Math.min(100, Math.max(...scores)+10);
  const xStep = data.length>1 ? (W-P*2)/(data.length-1) : 0;
  const ys = s => H - P - ((s-minS)/Math.max(1,maxS-minS))*(H-P*2);
  const pts = data.map((d,i)=>[P+i*xStep, ys(d.score)]);
  const poly = pts.map(p=>p.join(',')).join(' ');
  const fillPts = [[P,H-P],...pts,[P+(data.length-1)*xStep,H-P]].map(p=>p.join(',')).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;background:var(--bg);border:2px solid var(--line);border-radius:14px">
    <polygon points="${fillPts}" fill="rgba(28,176,246,.15)"/>
    <polyline points="${poly}" fill="none" stroke="var(--sky)" stroke-width="3" stroke-linejoin="round"/>
    ${pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="var(--sky)" stroke="var(--card)" stroke-width="2"/>
      <text x="${p[0]}" y="${p[1]-10}" text-anchor="middle" font-size="10" font-weight="800" fill="var(--ink)">${data[i].score}%</text>
      <text x="${p[0]}" y="${H-8}" text-anchor="middle" font-size="9" font-weight="700" fill="var(--sub)">${data[i].date.slice(0,5)}</text>`).join('')}
  </svg>`;
}

// ══════════════════════════════════════════════════════════ SEARCH
function openSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='';
  setTimeout(()=>document.getElementById('searchInput').focus(), 50);
}
function closeSearch(){document.getElementById('searchOverlay').classList.remove('open')}
function doSearch(q){
  const el = document.getElementById('searchResults');
  q = q.trim().toLowerCase();
  if(!q){el.innerHTML='';return}
  const results = [];
  CHAPTERS.forEach((ch,ci)=>ch.exercises.forEach(ex=>{
    if(ex.title.toLowerCase().includes(q) || ex.sub.toLowerCase().includes(q) || ch.title.toLowerCase().includes(q)){
      results.push({ch,ci,ex});
    }
  }));
  if(!results.length){el.innerHTML=`<div class="search-empty">Nessun risultato per "${q}"</div>`;return}
  el.innerHTML = results.slice(0,10).map(r=>{
    const th = CH_THEME[r.ci];
    return `<div class="search-res" onclick="closeSearch();goTopic(${r.ci},'${r.ex.id}','teoria')">
      <div class="search-res-ic" style="background:${th.bg};color:#fff">${th.ic}</div>
      <div class="search-res-body">
        <div class="search-res-title">${r.ex.title}</div>
        <div class="search-res-meta">${r.ch.title} · Arg. ${String(r.ex.num).padStart(2,'0')}</div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════ PDF EXPORT (via print)
function exportTopicPDF(exId){
  const ch = CHAPTERS[curCh];
  const ex = ch.exercises.find(e=>e.id===exId);
  if(!ex) return;
  let h = `<h1>${ch.title} · ${ex.title}</h1>`;
  h += `<p style="color:#666;font-style:italic">${ex.sub}</p>`;
  (ex.teoria||[]).forEach(t=>{
    if(t.tipo!=='schema'){h+=`<h2>${t.titolo}</h2><p>${t.corpo.replace(/<[^>]+>/g,m=>m.startsWith('<br')?'<br>':m.startsWith('<strong')||m.startsWith('</strong')?m:'')}</p>`}
  });
  if(ex.sapevi) h += `<h2>💡 Lo sapevi?</h2><p>${ex.sapevi}</p>`;
  if(ex.errori && ex.errori.length) h += `<h2>⚠️ Errori comuni</h2><ul>${ex.errori.map(e=>`<li>${e}</li>`).join('')}</ul>`;
  h += `<h2>Domande (${ex.questions.length})</h2>`;
  ex.questions.forEach((q,qi)=>{
    h += `<p><b>${qi+1}. ${q.testo}</b></p>`;
    q.opzioni.forEach((o,oi)=>{h+=`<p style="margin-left:20px">${['A','B','C','D'][oi]}) ${o} ${oi===q.corretta?'<b>✓</b>':''}</p>`});
    if(q.spiegazione) h += `<p style="margin-left:20px;font-style:italic;color:#555">→ ${q.spiegazione}</p>`;
  });
  document.getElementById('printArea').innerHTML = h;
  document.getElementById('printArea').style.display='block';
  setTimeout(()=>{window.print();document.getElementById('printArea').style.display='none'},50);
}
function exportChapterPDF(ci){
  const ch = CHAPTERS[ci];
  let h = `<h1>${ch.title}</h1>`;
  ch.exercises.forEach(ex=>{
    h += `<h2>${ex.title}</h2><p style="color:#666">${ex.sub}</p>`;
    (ex.teoria||[]).forEach(t=>{if(t.tipo!=='schema')h+=`<h3>${t.titolo}</h3><p>${t.corpo}</p>`});
    if(ex.sapevi) h += `<p><b>💡 Lo sapevi?</b> ${ex.sapevi}</p>`;
  });
  document.getElementById('printArea').innerHTML = h;
  document.getElementById('printArea').style.display='block';
  setTimeout(()=>{window.print();document.getElementById('printArea').style.display='none'},50);
}

// ══════════════════════════════════════════════════════════ TOASTS
function toast(msg, emoji){
  const wrap = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = (emoji?emoji+' ':'') + msg;
  wrap.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s'},1800);
  setTimeout(()=>t.remove(),2200);
}

// ══════════════════════════════════════════════════════════ DARK
function toggleDark(){
  const d = document.documentElement.classList.toggle('dark');
  localStorage.setItem('darkModeV2', d?'1':'0');
  document.getElementById('darkIcon').textContent = d?'☀️':'🌙';
}
if(localStorage.getItem('darkModeV2')==='1'){
  document.documentElement.classList.add('dark');
}

// ══════════════════════════════════════════════════════════ KEYBOARD
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    ['examConfigOverlay','statsOverlay','reviewOverlay','searchOverlay'].forEach(id=>{
      const el = document.getElementById(id);
      if(el && el.classList.contains('open')) el.classList.remove('open');
    });
  }
  if((e.metaKey||e.ctrlKey) && e.key==='k'){e.preventDefault();openSearch()}
});

// ══════════════════════════════════════════════════════════ INIT
window.addEventListener('DOMContentLoaded', ()=>{
  if(localStorage.getItem('darkModeV2')==='1'){
    document.documentElement.classList.add('dark');
    const di = document.getElementById('darkIcon');if(di)di.textContent='☀️';
  }
  currentUser = localStorage.getItem(SESSION_KEY) || null;
  if(currentUser){bootApp()} else {showLogin()}
  // periodic pomodoro re-render when ring rounds not in DOM
  setInterval(()=>{
    if(document.getElementById('app').style.display!=='none' && !document.querySelector('.pomo-ring') && view==='home'){renderRightRail()}
  }, 3000);
  updateReviewBadge();
});
