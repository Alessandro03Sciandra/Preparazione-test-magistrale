<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test Magistrale · Scienze Motorie UniTo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F7F3;
  --card:#FFFFFF;
  --ink:#2D2B2A;
  --sub:#7A7775;
  --line:#EAE7E2;
  --line-2:#DAD5CD;
  --shadow:0 2px 0 #DAD5CD;
  --shadow-hover:0 4px 0 #DAD5CD;
  --shadow-deep:0 4px 0 #B9B2A6;

  /* Duolingo-ish palette — saturated but warm */
  --grass:#58CC02;
  --grass-dark:#46A302;
  --grass-soft:#E6F7D4;
  --sky:#1CB0F6;
  --sky-dark:#1899D6;
  --sky-soft:#DDF4FD;
  --orange:#FF9600;
  --orange-dark:#E08600;
  --orange-soft:#FFF0D6;
  --red:#FF4B4B;
  --red-dark:#E63F3F;
  --red-soft:#FFE0E0;
  --violet:#CE82FF;
  --violet-dark:#B162E5;
  --violet-soft:#F3E6FF;
  --gold:#FFD900;
  --gold-dark:#E5C200;
  --gold-soft:#FFF7CA;
  --pink:#FF86D2;
  --teal:#00CD9C;
}
html.dark{
  --bg:#131417;
  --card:#1B1C21;
  --ink:#F4F1ED;
  --sub:#9AA0A6;
  --line:#2A2C32;
  --line-2:#3A3D44;
  --shadow:0 2px 0 #0C0D10;
  --shadow-hover:0 4px 0 #0C0D10;
  --shadow-deep:0 4px 0 #080909;
  --grass-soft:#1B3312;
  --sky-soft:#0E2A3C;
  --orange-soft:#3A2A0D;
  --red-soft:#3E1616;
  --violet-soft:#2C1A3F;
  --gold-soft:#3B3208;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Nunito',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  font-weight:700;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.serif{font-family:'Fraunces',Georgia,serif;font-weight:900;letter-spacing:-0.02em}
button{font-family:inherit;font-weight:800;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;font-weight:700;color:inherit}
a{color:inherit;text-decoration:none}

/* ══════════════════════════════════════════════════════════ LAYOUT ═ */
.app{display:grid;grid-template-columns:260px 1fr 320px;min-height:100vh;max-width:1440px;margin:0 auto}
@media(max-width:1100px){.app{grid-template-columns:80px 1fr}.right-rail{display:none}}
@media(max-width:720px){.app{grid-template-columns:1fr}.left-rail{display:none}.bottom-nav{display:flex!important}}

/* ══════════════════════════════════════════════════════════ LEFT RAIL ═ */
.left-rail{
  border-right:2px solid var(--line);
  padding:20px 18px;
  position:sticky;top:0;align-self:start;
  height:100vh;
  display:flex;flex-direction:column;gap:4px;
  background:var(--card);
}
@media(max-width:1100px){.left-rail{padding:16px 8px}}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px;border-bottom:2px solid var(--line);margin-bottom:12px}
.brand-mark{
  width:36px;height:36px;border-radius:12px;
  background:linear-gradient(135deg,var(--grass) 0%,var(--teal) 100%);
  display:grid;place-items:center;color:#fff;font-size:20px;flex-shrink:0;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.2);
}
.brand-name{font-family:'Fraunces',serif;font-weight:900;font-size:20px;letter-spacing:-.03em;line-height:1}
.brand-sub{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
@media(max-width:1100px){.brand-name,.brand-sub{display:none}.brand{justify-content:center;padding:4px 0 16px}}

.nav-btn{
  display:flex;align-items:center;gap:14px;
  padding:12px 14px;border-radius:14px;
  font-size:14px;font-weight:800;color:var(--sub);
  border:2px solid transparent;
  transition:.12s;
  cursor:pointer;text-align:left;
}
.nav-btn:hover{background:var(--bg);color:var(--ink)}
.nav-btn.active{background:var(--sky-soft);color:var(--sky-dark);border-color:#A5E4FF}
.nav-icon{font-size:22px;line-height:1;width:24px;text-align:center;flex-shrink:0}
@media(max-width:1100px){.nav-label{display:none}.nav-btn{justify-content:center;padding:12px 8px}}

.rail-footer{margin-top:auto;padding-top:12px;border-top:2px solid var(--line)}
.user-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;border:2px solid var(--line);cursor:pointer;transition:.12s}
.user-chip:hover{border-color:var(--line-2)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--violet);color:#fff;display:grid;place-items:center;font-weight:900;font-size:13px;flex-shrink:0}
.user-name{font-size:13px;font-weight:800;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:1100px){.user-name,.logout-ic{display:none}.user-chip{justify-content:center;padding:8px}}

/* ══════════════════════════════════════════════════════════ MAIN ═ */
.main{padding:28px 36px 120px;min-width:0}
@media(max-width:720px){.main{padding:16px 16px 100px}}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.greet{font-family:'Fraunces',serif;font-weight:900;font-size:36px;letter-spacing:-.02em;line-height:1.05}
.greet span{color:var(--grass-dark)}
.greet-sub{color:var(--sub);font-size:15px;margin-top:6px;font-weight:700}

/* ══════════════════════════════════════════════════════════ MOTIVATION PILL ═ */
.moto-pill{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--gold-soft);border:2px solid #F0D858;color:#8A6D00;
  padding:8px 14px;border-radius:99px;font-size:13px;font-weight:800;
  box-shadow:0 2px 0 #E0C848;
}

/* ══════════════════════════════════════════════════════════ STATS BAR ═ */
.stat-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
@media(max-width:720px){.stat-bar{grid-template-columns:repeat(2,1fr)}}
.stat{
  background:var(--card);border:2px solid var(--line);border-radius:18px;
  padding:16px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:12px;
}
.stat-ic{
  width:44px;height:44px;border-radius:14px;display:grid;place-items:center;
  font-size:22px;flex-shrink:0;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.12);
}
.stat-body{min-width:0}
.stat-val{font-family:'Fraunces',serif;font-weight:900;font-size:26px;line-height:1;letter-spacing:-.02em}
.stat-lbl{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;font-weight:800}

/* ══════════════════════════════════════════════════════════ SECTION ═ */
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:20px;margin:36px 0 16px}
.section-head:first-child{margin-top:0}
.section-title{font-family:'Fraunces',serif;font-weight:900;font-size:22px;letter-spacing:-.02em}
.section-sub{color:var(--sub);font-size:13px;font-weight:700}

/* ══════════════════════════════════════════════════════════ EXAM CTA ═ */
.exam-cta{
  background:linear-gradient(135deg,#1CB0F6 0%,#0A7EB8 100%);
  border-radius:24px;padding:24px 28px;
  display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;
  color:#fff;margin-bottom:28px;
  position:relative;overflow:hidden;
  box-shadow:0 6px 0 #0A7EB8;
}
.exam-cta::before{
  content:'';position:absolute;right:-40px;top:-40px;
  width:200px;height:200px;border-radius:50%;
  background:rgba(255,255,255,.12);
}
.exam-cta::after{
  content:'';position:absolute;right:40px;bottom:-30px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.08);
}
.exam-cta-body{position:relative}
.exam-cta-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.85;margin-bottom:6px}
.exam-cta-title{font-family:'Fraunces',serif;font-weight:900;font-size:28px;letter-spacing:-.02em;line-height:1.1;margin-bottom:6px}
.exam-cta-sub{font-size:14px;opacity:.9;font-weight:700}
.exam-cta-btn{
  background:#fff;color:#0A7EB8;
  border-radius:16px;padding:14px 24px;font-size:14px;font-weight:900;
  text-transform:uppercase;letter-spacing:.06em;
  box-shadow:0 4px 0 rgba(0,0,0,.15);
  transition:.12s;position:relative;
  white-space:nowrap;
}
.exam-cta-btn:hover{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.15)}

/* ══════════════════════════════════════════════════════════ CHAPTER GRID ═ */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.ch-card{
  background:var(--card);border:2px solid var(--line);border-radius:20px;
  padding:18px;cursor:pointer;position:relative;overflow:hidden;
  box-shadow:var(--shadow);transition:.14s;
  display:flex;flex-direction:column;gap:12px;
  min-height:170px;
}
.ch-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--line-2)}
.ch-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ch-card-ic{
  width:54px;height:54px;border-radius:18px;
  display:grid;place-items:center;font-size:28px;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.18);
}
.ch-card-num{font-size:11px;color:var(--sub);font-weight:800;text-transform:uppercase;letter-spacing:.1em}
.ch-card-title{font-family:'Fraunces',serif;font-weight:900;font-size:20px;letter-spacing:-.02em;line-height:1.1}
.ch-card-meta{font-size:12px;color:var(--sub);font-weight:700}
.ch-card-prog{display:flex;align-items:center;gap:10px;margin-top:auto}
.ch-card-bar{flex:1;height:10px;background:var(--line);border-radius:99px;overflow:hidden;border:1px solid var(--line-2)}
.ch-card-fill{height:100%;border-radius:99px;transition:.5s}
.ch-card-pct{font-size:12px;font-weight:900;min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
.ch-card-badge{
  position:absolute;top:14px;right:14px;
  background:var(--gold);color:#5C4A00;
  font-size:10px;font-weight:900;padding:3px 8px;border-radius:99px;
  display:none;
}
.ch-card.done .ch-card-badge{display:block}

/* ══════════════════════════════════════════════════════════ RIGHT RAIL ═ */
.right-rail{
  padding:24px 24px 24px 8px;
  position:sticky;top:0;align-self:start;
  height:100vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:16px;
}
.widget{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.widget-title{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.1em;font-weight:900;margin-bottom:12px}

/* Pomodoro */
.pomo{text-align:center}
.pomo-ring{position:relative;width:170px;height:170px;margin:0 auto 14px}
.pomo-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.pomo-ring-bg{fill:none;stroke:var(--line);stroke-width:10}
.pomo-ring-fill{fill:none;stroke:var(--red);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .5s}
.pomo-ring.focus .pomo-ring-fill{stroke:var(--red)}
.pomo-ring.pause .pomo-ring-fill{stroke:var(--grass)}
.pomo-time{
  position:absolute;inset:0;display:grid;place-items:center;
  font-family:'Fraunces',serif;font-weight:900;font-size:34px;letter-spacing:-.04em;
}
.pomo-time small{display:block;font-family:'Nunito',sans-serif;font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.1em;font-weight:900;margin-top:2px;letter-spacing:.1em}
.pomo-btns{display:flex;gap:8px;justify-content:center}
.pomo-btn{
  padding:10px 16px;border-radius:12px;font-size:12px;font-weight:900;
  text-transform:uppercase;letter-spacing:.06em;transition:.12s;
  border:2px solid;
}
.pomo-btn.play{background:var(--grass);color:#fff;border-color:var(--grass-dark);box-shadow:0 3px 0 var(--grass-dark)}
.pomo-btn.play:hover{transform:translateY(1px);box-shadow:0 2px 0 var(--grass-dark)}
.pomo-btn.reset{background:var(--card);color:var(--sub);border-color:var(--line-2)}
.pomo-mode{display:flex;gap:6px;margin-top:12px;background:var(--bg);border-radius:10px;padding:4px}
.pomo-mode-btn{flex:1;padding:6px;border-radius:8px;font-size:11px;color:var(--sub);font-weight:900}
.pomo-mode-btn.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}

/* Goals */
.goal{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.goal:last-child{margin-bottom:0}
.goal-ic{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:14px;flex-shrink:0;box-shadow:inset 0 -2px 0 rgba(0,0,0,.1)}
.goal-body{flex:1;min-width:0}
.goal-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:800;margin-bottom:4px}
.goal-top b{font-weight:900}
.goal-bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;border:1px solid var(--line-2)}
.goal-fill{height:100%;border-radius:99px;transition:.4s}

/* Streak */
.streak{display:flex;align-items:center;gap:14px}
.streak-flame{
  font-size:40px;filter:drop-shadow(0 2px 0 rgba(0,0,0,.1));
  animation:flamePulse 2s ease-in-out infinite;
}
@keyframes flamePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.streak-num{font-family:'Fraunces',serif;font-weight:900;font-size:40px;letter-spacing:-.04em;line-height:1}
.streak-lbl{font-size:12px;color:var(--sub);font-weight:800;margin-top:2px}
.streak-week{display:flex;gap:4px;margin-top:12px;justify-content:space-between}
.streak-day{flex:1;text-align:center}
.streak-day-lbl{font-size:9px;color:var(--sub);font-weight:900;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.streak-day-dot{
  width:100%;aspect-ratio:1;border-radius:8px;
  background:var(--line);
  display:grid;place-items:center;
  font-size:12px;
}
.streak-day-dot.done{background:var(--orange);color:#fff;box-shadow:inset 0 -2px 0 var(--orange-dark)}
.streak-day-dot.today{outline:2px solid var(--ink);outline-offset:2px}

/* Quick actions */
.qa{display:flex;flex-direction:column;gap:6px}
.qa-btn{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;
  background:var(--bg);font-size:13px;font-weight:800;color:var(--ink);
  border:2px solid transparent;transition:.12s;
}
.qa-btn:hover{background:var(--card);border-color:var(--line-2)}
.qa-ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:14px;flex-shrink:0;box-shadow:inset 0 -2px 0 rgba(0,0,0,.1)}

/* ══════════════════════════════════════════════════════════ BOTTOM NAV (mobile) ═ */
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-top:2px solid var(--line);padding:8px 12px;
  z-index:20;justify-content:space-around;
}
.bottom-nav .nav-btn{flex:1;justify-content:center;padding:8px}
.bottom-nav .nav-label{display:none}
.bottom-nav .nav-icon{font-size:24px}

/* ══════════════════════════════════════════════════════════ CHAPTER VIEW ═ */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--sub);margin-bottom:18px;text-transform:uppercase;letter-spacing:.06em}
.breadcrumb a{cursor:pointer;transition:.12s}
.breadcrumb a:hover{color:var(--ink)}
.breadcrumb .sep{color:var(--line-2)}
.breadcrumb .curr{color:var(--ink)}

.chapter-hero{
  border-radius:24px;padding:28px;margin-bottom:24px;
  display:flex;align-items:center;gap:20px;color:#fff;
  box-shadow:var(--shadow-deep);
  position:relative;overflow:hidden;
}
.chapter-hero::after{
  content:'';position:absolute;right:-60px;top:-60px;width:240px;height:240px;
  border-radius:50%;background:rgba(255,255,255,.13);
}
.chapter-hero-ic{font-size:56px;filter:drop-shadow(0 3px 0 rgba(0,0,0,.2));position:relative}
.chapter-hero-body{position:relative;flex:1}
.chapter-hero-eyebrow{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;opacity:.85;margin-bottom:4px}
.chapter-hero-title{font-family:'Fraunces',serif;font-weight:900;font-size:34px;letter-spacing:-.02em;line-height:1}
.chapter-hero-meta{font-size:14px;opacity:.92;margin-top:6px;font-weight:700}

.quiz-shortcuts{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.quiz-sc{
  background:var(--card);border:2px solid var(--line);border-radius:14px;
  padding:12px 16px;font-size:13px;font-weight:900;
  box-shadow:var(--shadow);transition:.12s;cursor:pointer;
  display:flex;align-items:center;gap:10px;
}
.quiz-sc:hover{transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.quiz-sc-ic{font-size:18px}

.topic-list{display:flex;flex-direction:column;gap:10px}
.topic{
  background:var(--card);border:2px solid var(--line);border-radius:18px;
  padding:18px 20px;cursor:pointer;transition:.14s;
  box-shadow:var(--shadow);
  display:flex;align-items:center;gap:16px;
}
.topic:hover{transform:translateX(4px);box-shadow:var(--shadow-hover)}
.topic-num{
  width:44px;height:44px;border-radius:50%;
  display:grid;place-items:center;flex-shrink:0;
  font-family:'Fraunces',serif;font-weight:900;font-size:18px;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.15);
  color:#fff;
}
.topic-body{flex:1;min-width:0}
.topic-title{font-weight:900;font-size:16px;margin-bottom:2px}
.topic-sub{font-size:12px;color:var(--sub);font-weight:700;line-height:1.4}
.topic-progress{display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:120px}
.topic-bar{flex:1;height:8px;background:var(--line);border-radius:99px;overflow:hidden;border:1px solid var(--line-2)}
.topic-fill{height:100%;border-radius:99px;transition:.4s}
.topic-status{font-size:11px;font-weight:900;min-width:40px;text-align:right;font-variant-numeric:tabular-nums;color:var(--sub)}
.topic.done .topic-status{color:var(--grass-dark)}
@media(max-width:640px){.topic-progress{display:none}}

/* ══════════════════════════════════════════════════════════ TOPIC DETAIL ═ */
.topic-header{margin-bottom:20px}
.topic-eyebrow{display:inline-block;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;padding:4px 10px;border-radius:99px;margin-bottom:10px}
.topic-h1{font-family:'Fraunces',serif;font-weight:900;font-size:34px;letter-spacing:-.02em;line-height:1.05;margin-bottom:6px}
.topic-h-sub{color:var(--sub);font-size:14px;font-weight:700}

.tabs{
  display:flex;gap:8px;margin-bottom:20px;
  background:var(--card);border:2px solid var(--line);border-radius:16px;padding:6px;
  box-shadow:var(--shadow);
  max-width:480px;
}
.tab{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:900;color:var(--sub);transition:.12s}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--ink);color:var(--card)}

/* Teoria cards */
.teoria-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.tcard{
  background:var(--card);border:2px solid var(--line);border-radius:18px;
  padding:18px 20px;box-shadow:var(--shadow);
}
.tcard-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tcard-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tcard-title{font-family:'Fraunces',serif;font-weight:900;font-size:18px;letter-spacing:-.01em}
.tcard-body{font-size:14.5px;line-height:1.65;color:var(--ink);font-weight:600}
.tcard-body strong{font-weight:900;background:var(--gold-soft);padding:0 4px;border-radius:4px}

.nota{border-radius:18px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:12px}
.nota-sapevi{background:var(--sky-soft);border:2px solid #A5E4FF}
.nota-errori{background:var(--red-soft);border:2px solid #FFB3B3}
.nota-note{background:var(--violet-soft);border:2px solid #D9B3FF}
.nota-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.nota-sapevi .nota-head{color:var(--sky-dark)}
.nota-errori .nota-head{color:var(--red-dark)}
.nota-note .nota-head{color:var(--violet-dark)}
.nota-body{font-size:14px;line-height:1.6;font-weight:600}
.nota-body ul{padding-left:22px}
.nota-body li{margin-bottom:4px}
.note-input{
  width:100%;background:rgba(255,255,255,.6);
  border:2px solid rgba(0,0,0,.08);border-radius:12px;
  padding:12px;font-size:14px;font-weight:600;resize:vertical;min-height:70px;outline:none;
  transition:.12s;
}
html.dark .note-input{background:rgba(0,0,0,.3)}
.note-input:focus{border-color:var(--violet)}

.action-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.action-btn{
  background:var(--card);border:2px solid var(--line);border-radius:14px;
  padding:10px 16px;font-size:13px;font-weight:900;
  box-shadow:var(--shadow);transition:.12s;
  display:inline-flex;align-items:center;gap:8px;
}
.action-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.action-btn.primary{background:var(--grass);color:#fff;border-color:var(--grass-dark);box-shadow:0 3px 0 var(--grass-dark)}
.action-btn.primary:hover{box-shadow:0 2px 0 var(--grass-dark);transform:translateY(1px)}

/* Quiz */
.quiz-wrap{max-width:640px}
.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.quiz-exit{
  width:36px;height:36px;border-radius:50%;border:2px solid var(--line);
  display:grid;place-items:center;font-size:16px;color:var(--sub);
  flex-shrink:0;transition:.12s;
}
.quiz-exit:hover{border-color:var(--line-2);color:var(--ink)}
.quiz-bar{flex:1;height:14px;background:var(--line);border-radius:99px;overflow:hidden;border:2px solid var(--line-2);position:relative}
.quiz-bar-fill{
  height:100%;background:var(--grass);border-radius:99px;transition:.4s;
  position:relative;
}
.quiz-bar-fill::after{
  content:'';position:absolute;top:2px;left:4px;right:4px;height:3px;
  background:rgba(255,255,255,.4);border-radius:99px;
}
.quiz-hearts{display:flex;gap:3px;align-items:center;color:var(--red);font-size:16px;font-weight:900}

.quiz-q{
  background:var(--card);border:2px solid var(--line);border-radius:20px;
  padding:28px 28px 24px;box-shadow:var(--shadow);margin-bottom:20px;
}
.quiz-q-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);margin-bottom:8px}
.quiz-q-text{font-family:'Fraunces',serif;font-weight:900;font-size:24px;letter-spacing:-.01em;line-height:1.25;margin-bottom:22px}

.quiz-opts{display:grid;gap:10px}
.quiz-opt{
  display:flex;align-items:center;gap:14px;
  background:var(--card);border:2px solid var(--line);border-radius:16px;
  padding:14px 18px;font-size:15px;font-weight:700;text-align:left;
  box-shadow:var(--shadow);transition:.14s;cursor:pointer;
}
.quiz-opt:hover:not(:disabled):not(.locked){transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--sky)}
.quiz-opt.selected{border-color:var(--sky);background:var(--sky-soft)}
.quiz-opt.correct{border-color:var(--grass);background:var(--grass-soft);color:var(--grass-dark)}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-soft);color:var(--red-dark)}
.quiz-opt:disabled,.quiz-opt.locked{cursor:default}
.quiz-opt-lbl{
  width:28px;height:28px;border-radius:8px;
  background:var(--bg);border:2px solid var(--line-2);
  display:grid;place-items:center;font-weight:900;font-size:12px;flex-shrink:0;
}
.quiz-opt.selected .quiz-opt-lbl{background:var(--sky);color:#fff;border-color:var(--sky-dark)}
.quiz-opt.correct .quiz-opt-lbl{background:var(--grass);color:#fff;border-color:var(--grass-dark)}
.quiz-opt.wrong .quiz-opt-lbl{background:var(--red);color:#fff;border-color:var(--red-dark)}

.quiz-feedback{
  border-radius:18px;padding:18px 20px;margin-top:18px;
  box-shadow:var(--shadow);
  display:flex;align-items:flex-start;gap:14px;
}
.quiz-feedback.ok{background:var(--grass-soft);border:2px solid var(--grass);color:var(--grass-dark)}
.quiz-feedback.ko{background:var(--red-soft);border:2px solid var(--red);color:var(--red-dark)}
.quiz-feedback-ic{font-size:28px;flex-shrink:0;line-height:1}
.quiz-feedback-label{font-family:'Fraunces',serif;font-weight:900;font-size:18px;margin-bottom:4px}
.quiz-feedback-text{font-size:13.5px;line-height:1.55;font-weight:700;color:var(--ink)}

.quiz-footer{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:20px}
.quiz-footer .action-btn.primary{padding:14px 28px;font-size:14px}
.quiz-dots{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 0}
.quiz-dot{width:10px;height:10px;border-radius:50%;background:var(--line);cursor:pointer;transition:.12s}
.quiz-dot.ok{background:var(--grass)}
.quiz-dot.ko{background:var(--red)}
.quiz-dot.curr{outline:2px solid var(--ink);outline-offset:2px;transform:scale(1.2)}

.quiz-result{
  background:var(--card);border:2px solid var(--line);border-radius:24px;
  padding:40px 28px;text-align:center;box-shadow:var(--shadow);
}
.quiz-result-emoji{font-size:80px;margin-bottom:14px;animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.quiz-result-score{font-family:'Fraunces',serif;font-weight:900;font-size:64px;letter-spacing:-.03em;line-height:1}
.quiz-result-lbl{font-size:16px;color:var(--sub);font-weight:700;margin-top:8px;margin-bottom:24px}

/* Flash cards */
.flash-wrap{max-width:560px;margin:0 auto}
.flash-progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:12px;font-weight:900;color:var(--sub);text-transform:uppercase;letter-spacing:.06em}
.flash-outer{perspective:1200px;margin-bottom:20px}
.flash-card{
  position:relative;width:100%;min-height:260px;
  transform-style:preserve-3d;transition:.6s cubic-bezier(.34,1.2,.64,1);
  cursor:pointer;
}
.flash-card.flipped{transform:rotateY(180deg)}
.flash-face{
  position:absolute;inset:0;
  border-radius:24px;padding:32px 28px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
  backface-visibility:hidden;
  box-shadow:var(--shadow-deep);
  border:2px solid;
}
.flash-front{background:var(--card);border-color:var(--line-2)}
.flash-back{background:var(--grass-soft);border-color:var(--grass);color:var(--grass-dark);transform:rotateY(180deg)}
.flash-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);margin-bottom:12px}
.flash-back .flash-label{color:var(--grass-dark)}
.flash-q{font-family:'Fraunces',serif;font-weight:900;font-size:22px;letter-spacing:-.01em;line-height:1.3;color:var(--ink)}
.flash-a{font-family:'Fraunces',serif;font-weight:900;font-size:24px;margin-bottom:10px;line-height:1.2}
.flash-exp{font-size:14px;font-weight:700;line-height:1.5;color:var(--ink);opacity:.85}
.flash-hint{font-size:11px;font-weight:900;color:var(--sub);margin-top:16px;letter-spacing:.06em;text-transform:uppercase}
.flash-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.flash-btns .action-btn{justify-content:center;padding:14px;font-size:13px}
.flash-btns .ko{background:var(--red);color:#fff;border-color:var(--red-dark);box-shadow:0 3px 0 var(--red-dark)}
.flash-btns .ok{background:var(--grass);color:#fff;border-color:var(--grass-dark);box-shadow:0 3px 0 var(--grass-dark)}

/* ══════════════════════════════════════════════════════════ EXAM OVERLAY ═ */
.overlay{position:fixed;inset:0;background:rgba(10,12,16,.55);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{
  background:var(--card);border:2px solid var(--line);border-radius:24px;
  width:100%;max-width:720px;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  padding:28px;
  animation:modalPop .25s cubic-bezier(.34,1.3,.64,1);
}
@keyframes modalPop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:20px}
.modal-title{font-family:'Fraunces',serif;font-weight:900;font-size:26px;letter-spacing:-.02em;line-height:1.1}
.modal-sub{font-size:13px;color:var(--sub);font-weight:700;margin-top:4px}
.modal-close{width:36px;height:36px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-size:16px;flex-shrink:0;transition:.12s}
.modal-close:hover{border-color:var(--line-2)}

.exam-config-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.exam-cfg{background:var(--bg);border:2px solid var(--line);border-radius:14px;padding:14px}
.exam-cfg-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.exam-cfg-ic{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;font-size:16px;flex-shrink:0;box-shadow:inset 0 -2px 0 rgba(0,0,0,.15)}
.exam-cfg-name{font-size:13px;font-weight:900}
.exam-cfg-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.exam-cfg-max{font-size:11px;color:var(--sub);font-weight:800}
.exam-num-ctrl{display:flex;align-items:center;background:var(--card);border:2px solid var(--line);border-radius:10px;overflow:hidden}
.exam-num-ctrl button{width:30px;height:30px;font-size:16px;font-weight:900;color:var(--sub);transition:.12s}
.exam-num-ctrl button:hover{background:var(--line);color:var(--ink)}
.exam-num-ctrl input{width:40px;height:30px;border:none;text-align:center;font-size:13px;font-weight:900;background:transparent;outline:none}

.exam-time-row{display:flex;gap:8px;margin-bottom:16px;background:var(--bg);border:2px solid var(--line);border-radius:14px;padding:14px;align-items:center}
.exam-time-row b{font-size:14px;flex:1}
.exam-time-opts{display:flex;gap:6px}
.exam-time-opt{padding:8px 14px;border-radius:10px;font-size:12px;font-weight:900;background:var(--card);border:2px solid var(--line)}
.exam-time-opt.active{background:var(--ink);color:var(--card);border-color:var(--ink)}

/* Exam running */
.exam-running{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column}
.exam-running.open{display:flex}
.exam-top{display:flex;align-items:center;gap:16px;padding:16px 24px;border-bottom:2px solid var(--line);background:var(--card)}
.exam-timer{font-family:'Fraunces',serif;font-weight:900;font-size:24px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;min-width:80px}
.exam-timer.warn{color:var(--red);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.exam-body{flex:1;overflow-y:auto;padding:32px 24px 120px}
.exam-body-inner{max-width:680px;margin:0 auto}
.exam-footer{
  position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:2px solid var(--line);
  padding:14px 24px;display:flex;justify-content:space-between;gap:10px;
}

/* ══════════════════════════════════════════════════════════ POMODORO OVERLAY (settings) ═ */
.pomo-settings{display:flex;gap:8px;margin-top:12px;justify-content:center}
.pomo-set{padding:6px 10px;border-radius:8px;font-size:11px;font-weight:900;background:var(--bg);border:2px solid var(--line);color:var(--sub)}

/* ══════════════════════════════════════════════════════════ LOGIN ═ */
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px}
.login-overlay.hide{display:none}
.login-box{
  background:var(--card);border:2px solid var(--line);border-radius:28px;
  padding:40px 32px;width:100%;max-width:400px;text-align:center;
  box-shadow:var(--shadow-deep);
}
.login-mark{
  width:72px;height:72px;border-radius:22px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--grass),var(--teal));
  display:grid;place-items:center;font-size:36px;color:#fff;
  box-shadow:inset 0 -4px 0 rgba(0,0,0,.2);
}
.login-h1{font-family:'Fraunces',serif;font-weight:900;font-size:26px;letter-spacing:-.02em;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--sub);font-weight:700;margin-bottom:24px}
.login-input{
  width:100%;background:var(--bg);border:2px solid var(--line);border-radius:14px;
  padding:14px 16px;font-size:14px;font-weight:700;margin-bottom:10px;outline:none;transition:.12s;
}
.login-input:focus{border-color:var(--sky)}
.login-btn{
  width:100%;background:var(--grass);color:#fff;border-radius:14px;
  padding:14px;font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;
  box-shadow:0 4px 0 var(--grass-dark);transition:.12s;
  margin-top:6px;
}
.login-btn:hover{transform:translateY(2px);box-shadow:0 2px 0 var(--grass-dark)}
.login-btn.secondary{background:var(--card);color:var(--sub);border:2px solid var(--line);box-shadow:var(--shadow);margin-top:10px}
.login-err{color:var(--red);font-size:12px;font-weight:800;min-height:18px;text-align:left;margin-bottom:4px}
.login-chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.login-chip{padding:6px 14px;border-radius:99px;background:var(--bg);border:2px solid var(--line);font-size:12px;font-weight:800;color:var(--sub);cursor:pointer;transition:.12s}
.login-chip:hover{border-color:var(--line-2);color:var(--ink)}
.login-divider{height:2px;background:var(--line);margin:18px 0}
.login-link{font-size:13px;color:var(--sub);margin-top:16px;font-weight:700}
.login-link a{color:var(--sky-dark);font-weight:900;cursor:pointer}

/* ══════════════════════════════════════════════════════════ SEARCH ═ */
.search-overlay{position:fixed;inset:0;background:rgba(10,12,16,.55);backdrop-filter:blur(6px);z-index:150;display:none;align-items:flex-start;justify-content:center;padding:80px 20px}
.search-overlay.open{display:flex}
.search-box{background:var(--card);border:2px solid var(--line);border-radius:20px;width:100%;max-width:540px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.search-input{width:100%;padding:20px 24px;border:none;outline:none;font-size:18px;font-weight:700;background:transparent;color:var(--ink);border-bottom:2px solid var(--line)}
.search-results{max-height:400px;overflow-y:auto}
.search-res{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:.12s;border-bottom:1px solid var(--line)}
.search-res:hover{background:var(--bg)}
.search-res:last-child{border-bottom:none}
.search-res-ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0;box-shadow:inset 0 -2px 0 rgba(0,0,0,.12)}
.search-res-body{flex:1;min-width:0}
.search-res-title{font-size:14px;font-weight:800}
.search-res-meta{font-size:11px;color:var(--sub);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.search-empty{padding:28px;text-align:center;color:var(--sub);font-size:14px;font-weight:700}

/* ══════════════════════════════════════════════════════════ TOASTS ═ */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  background:var(--ink);color:var(--card);padding:12px 18px;border-radius:14px;
  font-size:13px;font-weight:800;box-shadow:0 10px 30px rgba(0,0,0,.2);
  animation:toastIn .3s cubic-bezier(.34,1.3,.64,1);
  display:flex;align-items:center;gap:8px;
  pointer-events:auto;
}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ══════════════════════════════════════════════════════════ PRINT ═ */
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:fixed;inset:0;padding:20px;background:#fff;color:#000;font-family:Georgia,serif}
  #printArea h1{font-size:22px;margin-bottom:12px}
  #printArea h2{font-size:16px;margin:16px 0 6px}
  #printArea p{margin-bottom:8px;line-height:1.5}
  #printArea ul{margin-left:20px;margin-bottom:12px}
}

/* scrollbar tidy */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--sub)}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════ LOGIN -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <div class="login-mark">🎓</div>
    <div class="login-h1">Test Magistrale</div>
    <div class="login-sub">Scienze Motorie · UniTo</div>
    <div id="loginView">
      <div id="loginChips" class="login-chips"></div>
      <input class="login-input" id="loginUser" placeholder="Username" autocomplete="username"/>
      <input class="login-input" id="loginPwd" type="password" placeholder="Password" autocomplete="current-password"/>
      <div id="loginErr" class="login-err"></div>
      <button class="login-btn" onclick="submitLogin()">Accedi</button>
      <button class="login-btn secondary" onclick="enterGuest()">Entra come ospite</button>
      <div class="login-link">Primo accesso? <a onclick="showRegister()">Crea un account</a></div>
    </div>
    <div id="registerView" style="display:none">
      <input class="login-input" id="regUser" placeholder="Username" autocomplete="username"/>
      <input class="login-input" id="regPwd" type="password" placeholder="Password (min. 4)" autocomplete="new-password"/>
      <input class="login-input" id="regPwd2" type="password" placeholder="Ripeti password" autocomplete="new-password"/>
      <div id="regErr" class="login-err"></div>
      <button class="login-btn" onclick="submitRegister()">Crea account</button>
      <div class="login-link">Hai già un account? <a onclick="showLogin()">Accedi</a></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ APP -->
<div class="app" id="app" style="display:none">
  <!-- LEFT RAIL -->
  <aside class="left-rail">
    <div class="brand">
      <div class="brand-mark">🎓</div>
      <div>
        <div class="brand-name">Magistrale</div>
        <div class="brand-sub">Scienze Motorie</div>
      </div>
    </div>
    <button class="nav-btn active" data-nav="home" onclick="goHome()">
      <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" data-nav="exam" onclick="openExamConfig()">
      <span class="nav-icon">🎯</span><span class="nav-label">Esame</span>
    </button>
    <button class="nav-btn" data-nav="stats" onclick="openStats()">
      <span class="nav-icon">📊</span><span class="nav-label">Progressi</span>
    </button>
    <button class="nav-btn" data-nav="review" onclick="openReview()">
      <span class="nav-icon">🔁</span><span class="nav-label">Ripasso <span id="reviewBadge" style="display:none;background:var(--red);color:#fff;padding:2px 7px;border-radius:99px;font-size:10px;margin-left:4px"></span></span>
    </button>
    <button class="nav-btn" onclick="openSearch()">
      <span class="nav-icon">🔍</span><span class="nav-label">Cerca</span>
    </button>
    <div class="rail-footer">
      <button class="nav-btn" onclick="toggleDark()" style="margin-bottom:6px">
        <span class="nav-icon" id="darkIcon">🌙</span><span class="nav-label">Tema</span>
      </button>
      <div class="user-chip" onclick="confirmLogout()">
        <div class="user-avatar" id="userAvatar">A</div>
        <span class="user-name" id="userName">Utente</span>
        <span class="logout-ic" style="color:var(--sub);font-size:14px">⎋</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>

  <!-- RIGHT RAIL -->
  <aside class="right-rail" id="rightRail"></aside>
</div>

<!-- BOTTOM NAV (mobile) -->
<nav class="bottom-nav">
  <button class="nav-btn" onclick="goHome()"><span class="nav-icon">🏠</span></button>
  <button class="nav-btn" onclick="openExamConfig()"><span class="nav-icon">🎯</span></button>
  <button class="nav-btn" onclick="openStats()"><span class="nav-icon">📊</span></button>
  <button class="nav-btn" onclick="openReview()"><span class="nav-icon">🔁</span></button>
  <button class="nav-btn" onclick="openSearch()"><span class="nav-icon">🔍</span></button>
</nav>

<!-- ═══════════════════════════════════════════════ OVERLAYS -->
<div id="examConfigOverlay" class="overlay"></div>
<div id="examRunning" class="exam-running"></div>
<div id="statsOverlay" class="overlay"></div>
<div id="reviewOverlay" class="overlay"></div>

function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY)||'{}')}catch(e){return{}}}

function hashPwd(p){return btoa(unescape(encodeURIComponent(p)))}

  const el = document.getElementById('loginChips');
  const users = getUsers();
  const names = Object.keys(users);
  if(!names.length){el.innerHTML='';return}
  el.innerHTML = names.slice(0,4).map(n =>
    `<div class="login-chip" onclick="document.getElementById('loginUser').value='${n}';document.getElementById('loginPwd').focus()">${n}</div>`
  ).join('');
}
function showLogin(){document.getElementById('loginView').style.display='';document.getElementById('registerView').style.display='none';buildUserChips()}
function showRegister(){document.getElementById('loginView').style.display='none';document.getElementById('registerView').style.display=''}

  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPwd').value;
  const err = document.getElementById('loginErr');
  if(!u||!p){err.textContent='Compila tutti i campi.';return}
  const users = getUsers();
  if(!users[u]){err.textContent='Utente non trovato.';return}
  if(users[u]!==hashPwd(p)){err.textContent='Password errata.';return}
  currentUser = u;
  localStorage.setItem(SESSION_KEY,u);
  bootApp();
}
function submitRegister(){
  const u = document.getElementById('regUser').value.trim();
  const p = document.getElementById('regPwd').value;
  const p2 = document.getElementById('regPwd2').value;
  const err = document.getElementById('regErr');
  if(!u||!p||!p2){err.textContent='Compila tutti i campi.';return}
  if(u.length<2){err.textContent='Username troppo corto.';return}
  if(p.length<4){err.textContent='Minimo 4 caratteri per la password.';return}
  if(p!==p2){err.textContent='Le password non coincidono.';return}
  const users = getUsers();
  if(users[u]){err.textContent='Username già in uso.';return}
  users[u] = hashPwd(p);
  saveUsers(users);
  currentUser = u;
  localStorage.setItem(SESSION_KEY,u);
  bootApp();
}
function enterGuest(){
  currentUser = 'Ospite';
  localStorage.setItem(SESSION_KEY,'Ospite');
  bootApp();
}
function confirmLogout(){
  if(confirm('Esci dall\'account?')) doLogout();
}
function doLogout(){
  currentUser = null;
  localStorage.removeItem(SESSION_KEY);
  document.getElementById('app').style.display='none';
  document.getElementById('loginOverlay').classList.remove('hide');
  showLogin();
}

function bootApp(){
  document.getElementById('loginOverlay').classList.add('hide');
  document.getElementById('app').style.display='grid';
  const av = document.getElementById('userAvatar');
  av.textContent = (currentUser||'?')[0].toUpperCase();
  av.style.background = stringToColor(currentUser||'?');
  document.getElementById('userName').textContent = currentUser||'Ospite';
  touchStreak();
  goHome();
}

function stringToColor(s){
  let h = 0;
  for(let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) & 0xFFFFFF;
  const hues = [210, 15, 330, 160, 270, 100, 40];
  return `hsl(${hues[h%hues.length]} 55% 55%)`;
}

// ══════════════════════════════════════════════════════════ STREAK / GOALS
function getStreak(){
  const s = lsGet('streak', {count:0,last:null,days:[]});
  return s;
}
function touchStreak(){
  const s = getStreak();
  const t = today(), yest = addDays(-1);
  if(s.last===t) return s;
  if(s.last===yest) s.count = (s.count||0)+1;
  else s.count = 1;
  s.last = t;
  if(!s.days) s.days=[];
  if(!s.days.includes(t)) s.days.push(t);
  if(s.days.length>60) s.days = s.days.slice(-60);
  lsSet('streak', s);
  return s;
}
function wasActive(dateStr){
  const s = getStreak();
  return (s.days||[]).includes(dateStr);
}

function getGoals(){
  const g = lsGet('goals', {date:null,topics:0,questions:0,focusMin:0,topicIds:[]});
  if(g.date !== today()) return {date:today(),topics:0,questions:0,focusMin:0,topicIds:[]};
  return g;
}
function saveGoals(g){lsSet('goals', g)}
function trackTopic(exId){
  const g = getGoals();
  if(!g.topicIds.includes(exId)){g.topicIds.push(exId);g.topics = g.topicIds.length}
  saveGoals(g);
}
function trackQuestion(){
  const g = getGoals();
  g.questions = (g.questions||0)+1;
  saveGoals(g);
}
function trackFocusMin(n){
  const g = getGoals();
  g.focusMin = (g.focusMin||0)+n;
  saveGoals(g);
}

// ══════════════════════════════════════════════════════════ XP / SRS
function getXP(){return lsGet('xp', 0)}
function addXP(n){const x=getXP()+n;lsSet('xp',x);toast(`+${n} XP`, '⭐');}
function getSR(){return lsGet('sr', {})}
function saveSR(d){lsSet('sr', d)}
function qId(exId, qi){return exId+'_'+qi}
function updateSR(qid, ok){
  const d = getSR(), t = today();
  const q = d[qid] || {iv:1, due:t, ok:0, ko:0};
  if(ok){q.iv = Math.min(Math.round(q.iv*2.2), 30); q.ok = (q.ok||0)+1}
  else{q.iv = 1; q.ko = (q.ko||0)+1}
  q.due = addDays(q.iv);
  d[qid] = q;
  saveSR(d);
  updateReviewBadge();
}
function getDueQuestions(){
  const sr = getSR(), t = today(), res = [];
  CHAPTERS.forEach((ch,ci) => ch.exercises.forEach(ex => ex.questions.forEach((q,qi) => {
    const id = qId(ex.id, qi);
    const d = sr[id];
    if(d && d.due<=t) res.push({ch,ci,ex,q,qi,qid:id});
  })));
  return res;
}
function updateReviewBadge(){
  const n = getDueQuestions().length;
  const b = document.getElementById('reviewBadge');
  if(b){b.style.display = n ? '' : 'none'; b.textContent = n}
}

function setActiveNav(name){
  document.querySelectorAll('[data-nav]').forEach(el => el.classList.toggle('active', el.dataset.nav===name));
}
function goHome(){
  view='home';curCh=null;curEx=null;
  setActiveNav('home');
  renderHome();
  renderRightRail();
  window.scrollTo(0,0);
}
function goChapter(ci){
  view='chapter';curCh=ci;curEx=null;
  setActiveNav(null);
  renderChapter();
  renderRightRail();
  window.scrollTo(0,0);
}
function goTopic(ci,exId,tab){
  view='topic';curCh=ci;curEx=exId;curTab=tab||'teoria';
  qI=0;qAns=[];qDone=false;fcI=0;fcFlipped=false;fcScores={};
  trackTopic(exId);
  renderTopic();
  renderRightRail();
  window.scrollTo(0,0);
}

function totalDone(){
  const sr = getSR();
  let n = 0;
  CHAPTERS.forEach(ch => ch.exercises.forEach(ex => ex.questions.forEach((_,qi) => {
    const d = sr[qId(ex.id,qi)];
    if(d && d.ok>0) n++;
  })));
  return n;
}
function totalQuestions(){
  let n=0;CHAPTERS.forEach(ch=>ch.exercises.forEach(ex=>n+=ex.questions.length));return n;
}
function totalTopics(){
  const sr = getSR();
  const seen = new Set();
  CHAPTERS.forEach(ch => ch.exercises.forEach(ex => ex.questions.forEach((_,qi) => {
    const d = sr[qId(ex.id,qi)];
    if(d) seen.add(ex.id);
  })));
  return seen.size;
}

// ══════════════════════════════════════════════════════════ TOPIC
let qI=0, qAns=[], qDone=false;
let fcI=0, fcFlipped=false, fcScores={};

function renderTopic(){
  const ch = CHAPTERS[curCh];
  const th = CH_THEME[curCh];
  const ex = ch.exercises.find(e=>e.id===curEx);
  if(!ex) return goChapter(curCh);

  let h = `
    <div class="breadcrumb">
      <a onclick="goHome()">🏠 Home</a>
      <span class="sep">/</span>
      <a onclick="goChapter(${curCh})">${ch.title}</a>
      <span class="sep">/</span>
      <span class="curr">${ex.title}</span>
    </div>

    <div class="topic-header">
      <span class="topic-eyebrow" style="background:${th.bg};color:#fff">${th.ic} ${ch.title} · Arg. ${String(ex.num).padStart(2,'0')}</span>
      <div class="topic-h1">${ex.title}</div>
      <div class="topic-h-sub">${ex.sub}</div>
    </div>

    <div class="tabs">
      <button class="tab ${curTab==='teoria'?'active':''}" onclick="switchTab('teoria')">📚 Teoria</button>
      <button class="tab ${curTab==='quiz'?'active':''}" onclick="switchTab('quiz')">✍️ Quiz</button>
      <button class="tab ${curTab==='flash'?'active':''}" onclick="switchTab('flash')">🃏 Flash</button>
    </div>

    <div id="tabContent">
      ${curTab==='teoria' ? renderTeoria(ch,th,ex) : curTab==='quiz' ? renderQuiz(ch,th,ex) : renderFlash(ch,th,ex)}
    </div>
  `;
  document.getElementById('main').innerHTML = h;
}
function switchTab(t){curTab=t;if(t==='flash'){fcI=0;fcFlipped=false;fcScores={}}renderTopic();renderRightRail();}

function renderTeoria(ch,th,ex){
  const noteKey = 'note_'+ex.id;
  const saved = lsGet(noteKey, '');
  let h = '<div class="teoria-grid">';
  (ex.teoria||[]).forEach(t => {
    if(t.tipo==='schema') return;
    h += `<div class="tcard">
      <div class="tcard-head">
        <div class="tcard-dot" style="background:${th.solid}"></div>
        <div class="tcard-title">${t.titolo}</div>
      </div>
      <div class="tcard-body">${t.corpo}</div>
    </div>`;
  });
  h += '</div>';

  if(ex.sapevi) h += `<div class="nota nota-sapevi">
    <div class="nota-head">💡 Lo sapevi?</div>
    <div class="nota-body">${ex.sapevi}</div>
  </div>`;

  if(ex.errori && ex.errori.length) h += `<div class="nota nota-errori">
    <div class="nota-head">⚠️ Errori comuni</div>
    <div class="nota-body"><ul>${ex.errori.map(e=>`<li>${e}</li>`).join('')}</ul></div>
  </div>`;

  h += `<div class="nota nota-note">
    <div class="nota-head">✏️ Le tue note</div>
    <textarea class="note-input" placeholder="Scrivi appunti, mnemonici, dubbi…"
      onchange="lsSet('${noteKey}', this.value)">${saved}</textarea>
  </div>`;

  h += `<div class="action-row">
    <button class="action-btn primary" onclick="switchTab('quiz')">📝 Inizia il quiz →</button>
    <button class="action-btn" onclick="switchTab('flash')">🃏 Flash card</button>
    <button class="action-btn" onclick="exportTopicPDF('${ex.id}')">📄 Esporta PDF</button>
  </div>`;
  return h;
}

function renderQuiz(ch,th,ex){
  const qs = ex.questions;
  if(!qs.length) return '<p style="color:var(--sub);padding:20px">Nessuna domanda disponibile.</p>';

  if(qDone){
    const ok = qAns.filter((a,i)=>a===qs[i].corretta).length;
    const pct = Math.round(ok/qs.length*100);
    const emoji = pct===100?'🏆':pct>=80?'🌟':pct>=60?'👍':pct>=40?'💪':'📚';
    const msg = pct===100?'Perfetto! Sei un/a campione!':pct>=80?'Ottimo lavoro!':pct>=60?'Bene, si può fare meglio!':pct>=40?'Continua ad allenarti.':'Rivedi la teoria e riprova!';
    const col = pct>=70?'var(--grass-dark)':pct>=50?'var(--orange-dark)':'var(--red-dark)';
    return `<div class="quiz-wrap"><div class="quiz-result">
      <div class="quiz-result-emoji">${emoji}</div>
      <div class="quiz-result-score" style="color:${col}">${pct}%</div>
      <div class="quiz-result-lbl">${ok}/${qs.length} risposte corrette · ${msg}</div>
      <div class="action-row" style="justify-content:center">
        <button class="action-btn primary" onclick="resetQuiz()">🔄 Riprova</button>
        <button class="action-btn" onclick="switchTab('flash')">🃏 Flash card</button>
        <button class="action-btn" onclick="goChapter(${curCh})">← Torna al capitolo</button>
      </div>
    </div></div>`;
  }

  const q = qs[qI];
  const answered = qAns[qI]!==undefined;
  const correct = answered && qAns[qI]===q.corretta;
  const pct = (qI / qs.length) * 100;
  const heartsLeft = qAns.filter((a,i)=>a!==undefined && a!==qs[i].corretta).length;

  let h = `<div class="quiz-wrap">
    <div class="quiz-progress">
      <button class="quiz-exit" onclick="if(confirm('Uscire dal quiz?')){qDone=false;switchTab('teoria')}" title="Esci">✕</button>
      <div class="quiz-bar"><div class="quiz-bar-fill" style="width:${pct}%;background:${th.solid}"></div></div>
      <div class="quiz-hearts">${'❌'.repeat(heartsLeft)||'♥'}</div>
    </div>

    <div class="quiz-q">
      <div class="quiz-q-label">Domanda ${qI+1} di ${qs.length}</div>
      <div class="quiz-q-text">${q.testo}</div>
      <div class="quiz-opts">
        ${q.opzioni.map((op,oi)=>{
          let cls = 'quiz-opt';
          if(answered){
            cls += ' locked';
            if(oi===q.corretta) cls += ' correct';
            else if(oi===qAns[qI]) cls += ' wrong';
          }
          return `<button class="${cls}" onclick="${answered?'':'answerQ('+oi+')'}">
            <span class="quiz-opt-lbl">${['A','B','C','D'][oi]}</span>
            <span>${op}</span>
          </button>`;
        }).join('')}
      </div>
    </div>

    ${answered ? `<div class="quiz-feedback ${correct?'ok':'ko'}">
      <div class="quiz-feedback-ic">${correct?'🎉':'🤔'}</div>
      <div>
        <div class="quiz-feedback-label">${correct?'Ottimo!':'Risposta corretta: '+q.opzioni[q.corretta]}</div>
        <div class="quiz-feedback-text">${q.spiegazione||''}</div>
      </div>
    </div>` : ''}

    <div class="quiz-footer">
      <button class="action-btn" onclick="prevQ()" ${qI===0?'disabled style="opacity:.4"':''}>← Indietro</button>
      ${answered ? `<button class="action-btn primary" onclick="${qI<qs.length-1?'nextQ()':'finishQuiz()'}">
        ${qI<qs.length-1?'Prossima →':'Vedi risultato →'}
      </button>` : ''}
    </div>

    <div class="quiz-dots">${qs.map((_,i)=>{
      let c = 'quiz-dot';
      if(i===qI) c += ' curr';
      else if(qAns[i]!==undefined) c += qAns[i]===qs[i].corretta ? ' ok' : ' ko';
      return `<div class="${c}" onclick="jumpQ(${i})"></div>`;
    }).join('')}</div>
  </div>`;
  return h;
}

function answerQ(oi){
  const ex = CHAPTERS[curCh].exercises.find(e=>e.id===curEx);
  if(qAns[qI]!==undefined) return;
  qAns[qI] = oi;
  const correct = oi === ex.questions[qI].corretta;
  updateSR(qId(curEx,qI), correct);
  trackQuestion();
  if(correct) addXP(10); else addXP(2);
  renderTopic();
  renderRightRail();
}
function prevQ(){if(qI>0){qI--;renderTopic()}}
function nextQ(){const ex=CHAPTERS[curCh].exercises.find(e=>e.id===curEx);if(qI<ex.questions.length-1){qI++;renderTopic()}}
function jumpQ(i){qI=i;renderTopic()}
function finishQuiz(){qDone=true;const ex=CHAPTERS[curCh].exercises.find(e=>e.id===curEx);const ok=qAns.filter((a,i)=>a===ex.questions[i].corretta).length;if(ok===ex.questions.length)addXP(50);renderTopic();renderRightRail();}
function resetQuiz(){qI=0;qAns=[];qDone=false;renderTopic();renderRightRail();}

function renderFlash(ch,th,ex){
  const qs = ex.questions;
  if(!qs.length) return '<p style="color:var(--sub);padding:20px">Nessuna domanda disponibile.</p>';

  const answered = Object.keys(fcScores).length;
  if(answered===qs.length){
    const ok = Object.values(fcScores).filter(v=>v).length;
    const pct = Math.round(ok/qs.length*100);
    const emoji = pct>=80?'🌟':pct>=50?'👍':'📚';
    return `<div class="flash-wrap"><div class="quiz-result">
      <div class="quiz-result-emoji">${emoji}</div>
      <div class="quiz-result-score" style="color:${pct>=70?'var(--grass-dark)':'var(--orange-dark)'}">${pct}%</div>

    <div class="flash-progress">
      <span>🃏 Carta ${fcI+1} / ${qs.length}</span>
      <span>${answered} / ${qs.length} completate</span>
    </div>

          <div class="flash-exp">${q.spiegazione||''}</div>
        </div>

    ${fcFlipped && fcScores[fcI]===undefined ? `<div class="flash-btns">
      <button class="action-btn ko" onclick="scoreFlash(false)">✗ Non lo sapevo</button>
      <button class="action-btn ok" onclick="scoreFlash(true)">✓ Lo sapevo</button>
    </div>` : !fcFlipped ? `<div style="text-align:center;color:var(--sub);font-size:13px;font-weight:700">Prova a rispondere mentalmente, poi gira la carta</div>` : ''}

    <div class="quiz-dots" style="margin-top:16px">${qs.map((_,i)=>{

      else if(fcScores[i]===false) c+=' ko';
      return `<div class="${c}" onclick="fcI=${i};fcFlipped=false;renderTopic()"></div>`;
    }).join('')}</div>

}
function flipFlash(){fcFlipped=!fcFlipped;renderTopic()}
function scoreFlash(ok){
  fcScores[fcI] = ok;
  updateSR(qId(curEx,fcI), ok);
  if(ok) addXP(5);
  setTimeout(()=>{
    const ex = CHAPTERS[curCh].exercises.find(e=>e.id===curEx);
    if(fcI < ex.questions.length-1){fcI++;fcFlipped=false}

    renderRightRail();

}

function renderStreakWidget(){
  const s = getStreak();
  const labels = ['L','M','M','G','V','S','D']; // ISO: Mon=0 in our mapping
  const now = new Date();
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(now);
    d.setDate(d.getDate()-i);
    const iso = d.toISOString().split('T')[0];
    const dow = (d.getDay()+6)%7; // Mon=0
    days.push({iso, label:labels[dow], done:wasActive(iso), today:iso===today()});
  }
  return `<div class="widget">
    <div class="widget-title">🔥 Streak</div>
    <div class="streak">
      <div class="streak-flame">🔥</div>
      <div>

        <div class="streak-lbl">${s.count===1?'giorno':'giorni'} consecutivi</div>

    <div class="streak-week">
      ${days.map(d=>`<div class="streak-day">
        <div class="streak-day-lbl">${d.label}</div>
        <div class="streak-day-dot ${d.done?'done':''} ${d.today?'today':''}">${d.done?'🔥':''}</div>
      </div>`).join('')}

}

// ══════════════════════════════════════════════════════════ POMODORO
let pomoState = {
  mode:'focus', // focus | short | long
  durations:{focus:25, short:5, long:15},
  remaining:25*60,
  running:false,
  interval:null
};
function renderPomodoroWidget(){
  const pct = 1 - (pomoState.remaining / (pomoState.durations[pomoState.mode]*60));
  const C = 2*Math.PI*75;
  const off = C * (1 - pct);
  const ringClass = pomoState.mode==='focus'?'focus':'pause';
  const mm = String(Math.floor(pomoState.remaining/60)).padStart(2,'0');
  const ss = String(pomoState.remaining%60).padStart(2,'0');
  return `<div class="widget pomo">
    <div class="widget-title">🍅 Pomodoro</div>
    <div class="pomo-ring ${ringClass}">
      <svg viewBox="0 0 170 170">
        <circle class="pomo-ring-bg" cx="85" cy="85" r="75"/>
        <circle class="pomo-ring-fill" cx="85" cy="85" r="75"
          stroke-dasharray="${C}"
          stroke-dashoffset="${off}"/>
      </svg>
      <div class="pomo-time">
        <div>${mm}:${ss}<small>${pomoState.mode==='focus'?'Focus':pomoState.mode==='short'?'Pausa breve':'Pausa lunga'}</small></div>
      </div>
    </div>
    <div class="pomo-btns">
      <button class="pomo-btn play" onclick="togglePomo()">${pomoState.running?'❚❚ Pausa':'▶ Avvia'}</button>
      <button class="pomo-btn reset" onclick="resetPomo()">↺</button>
    </div>
    <div class="pomo-mode">
      <button class="pomo-mode-btn ${pomoState.mode==='focus'?'active':''}" onclick="setPomoMode('focus')">Focus</button>
      <button class="pomo-mode-btn ${pomoState.mode==='short'?'active':''}" onclick="setPomoMode('short')">5m</button>
      <button class="pomo-mode-btn ${pomoState.mode==='long'?'active':''}" onclick="setPomoMode('long')">15m</button>
    </div>
  </div>`;
}
function hookPomodoroUI(){} // (no-op, ring updates via re-render)
function setPomoMode(m){
  pomoState.mode = m;
  pomoState.remaining = pomoState.durations[m]*60;
  pomoState.running = false;
  if(pomoState.interval){clearInterval(pomoState.interval);pomoState.interval=null}
  renderRightRail();
}
function togglePomo(){
  pomoState.running = !pomoState.running;
  if(pomoState.running){
    let tick = 0;
    pomoState.interval = setInterval(()=>{
      pomoState.remaining--;
      tick++;
      if(pomoState.mode==='focus' && tick%60===0) trackFocusMin(1);
      if(pomoState.remaining<=0){
        clearInterval(pomoState.interval);pomoState.interval=null;
        pomoState.running=false;
        if(pomoState.mode==='focus'){
          addXP(25);
          toast('Focus completato! +25 XP', '🎉');
          setPomoMode('short');
        } else {
          toast('Pausa finita!', '⏰');
          setPomoMode('focus');
        }
        return;
      }
      // Light-touch update: only update ring text
      const el = document.querySelector('.pomo-time>div');
      if(el){
        const mm = String(Math.floor(pomoState.remaining/60)).padStart(2,'0');
        const ss = String(pomoState.remaining%60).padStart(2,'0');
        el.innerHTML = `${mm}:${ss}<small>${pomoState.mode==='focus'?'Focus':pomoState.mode==='short'?'Pausa breve':'Pausa lunga'}</small>`;
      }
      const ringFill = document.querySelector('.pomo-ring-fill');
      if(ringFill){
        const C=2*Math.PI*75;
        const pct = 1 - (pomoState.remaining / (pomoState.durations[pomoState.mode]*60));
        ringFill.setAttribute('stroke-dashoffset', C*(1-pct));
      }
      const btn = document.querySelector('.pomo-btn.play');
      if(btn) btn.textContent = pomoState.running?'❚❚ Pausa':'▶ Avvia';
    },1000);
  } else {
    clearInterval(pomoState.interval);pomoState.interval=null;
  }
  const btn = document.querySelector('.pomo-btn.play');
  if(btn) btn.textContent = pomoState.running?'❚❚ Pausa':'▶ Avvia';
}
function resetPomo(){
  pomoState.running=false;
  if(pomoState.interval){clearInterval(pomoState.interval);pomoState.interval=null}
  pomoState.remaining = pomoState.durations[pomoState.mode]*60;
  renderRightRail();
}

function startChapterQuiz(n){

  ch.exercises.forEach((ex,ei)=>ex.questions.forEach((q,qi)=>pool.push({q,ex,ei,qi})));
  pool.sort(()=>Math.random()-.5);

// ══════════════════════════════════════════════════════════ REVIEW (spaced)
function openReview(){
  let due = getDueQuestions();
  if(!due.length){
    // Build random review from all questions
    const all = [];
    CHAPTERS.forEach((ch,ci)=>ch.exercises.forEach(ex=>ex.questions.forEach((q,qi)=>all.push({ch,ci,ex,q,qi,qid:qId(ex.id,qi)}))));
    all.sort(()=>Math.random()-.5);
    due = all.slice(0,7);
  } else {
    due.sort(()=>Math.random()-.5);
    due = due.slice(0,Math.min(10,due.length));
  }
  const items = due.map(d=>({q:d.q, ex:d.ex, ci:d.ci, qi:d.qi}));
  runReviewQuiz(items, '🔁 Ripasso rapido', `${items.length} domande ${getDueQuestions().length?'da ripetere':'casuali'}`);
}

let rState = null;
function runReviewQuiz(items, title, sub){
  rState = {items, i:0, ans:[], done:false, title, sub};
  renderReviewOverlay();
  document.getElementById('reviewOverlay').classList.add('open');
}
function closeReview(){document.getElementById('reviewOverlay').classList.remove('open');}
function renderReviewOverlay(){
  const el = document.getElementById('reviewOverlay');
  if(!rState){el.classList.remove('open');return}
  if(rState.done){
    const ok = rState.ans.filter((a,i)=>a===rState.items[i].q.corretta).length;
    const pct = Math.round(ok/rState.items.length*100);
    const emoji = pct===100?'🏆':pct>=70?'🌟':pct>=50?'👍':'💪';
    el.innerHTML = `<div class="modal">
      <div class="modal-head">
        <div><div class="modal-title">${emoji} Ripasso completato</div><div class="modal-sub">${rState.sub}</div></div>
        <button class="modal-close" onclick="closeReview()">✕</button>
      </div>
      <div style="text-align:center;padding:28px 0">
        <div class="serif" style="font-size:72px;color:${pct>=70?'var(--grass-dark)':'var(--orange-dark)'};line-height:1">${pct}%</div>
        <div style="font-size:14px;color:var(--sub);font-weight:700;margin-top:6px">${ok}/${rState.items.length} corrette</div>
      </div>
      <div class="action-row" style="justify-content:center">
        <button class="action-btn primary" onclick="closeReview()">Chiudi</button>
      </div>
    </div>`;
    return;
  }
  const q = rState.items[rState.i].q;
  const ex = rState.items[rState.i].ex;
  const ci = rState.items[rState.i].ci ?? rState.items[rState.i].ei;
  const th = CH_THEME[ci!=null?ci:0];
  const answered = rState.ans[rState.i]!==undefined;
  const correct = answered && rState.ans[rState.i]===q.corretta;
  const pct = (rState.i / rState.items.length) * 100;

  el.innerHTML = `<div class="modal">
    <div class="modal-head">
      <div><div class="modal-title">${rState.title}</div><div class="modal-sub">${rState.sub}</div></div>
      <button class="modal-close" onclick="closeReview()">✕</button>
    </div>
    <div class="quiz-progress">
      <div class="quiz-bar" style="flex:1"><div class="quiz-bar-fill" style="width:${pct}%;background:${th.solid}"></div></div>
      <div style="color:var(--sub);font-size:13px;font-weight:900;min-width:60px;text-align:right">${rState.i+1}/${rState.items.length}</div>
    </div>
    <div class="quiz-q" style="padding:22px;box-shadow:none;border:none">
      <div class="quiz-q-label">${ex.title}</div>
      <div class="quiz-q-text" style="font-size:20px">${q.testo}</div>
      <div class="quiz-opts">
        ${q.opzioni.map((op,oi)=>{
          let cls='quiz-opt';
          if(answered){cls+=' locked';if(oi===q.corretta)cls+=' correct';else if(oi===rState.ans[rState.i])cls+=' wrong'}
          return `<button class="${cls}" onclick="${answered?'':'answerReview('+oi+')'}">
            <span class="quiz-opt-lbl">${['A','B','C','D'][oi]}</span><span>${op}</span>
          </button>`;
        }).join('')}
      </div>
      ${answered ? `<div class="quiz-feedback ${correct?'ok':'ko'}" style="margin-top:16px">
        <div class="quiz-feedback-ic">${correct?'🎉':'💡'}</div>
        <div><div class="quiz-feedback-label">${correct?'Corretta!':'Risposta: '+q.opzioni[q.corretta]}</div>
        <div class="quiz-feedback-text">${q.spiegazione||''}</div></div>
      </div>` : ''}
    </div>
    <div class="action-row" style="justify-content:space-between;margin-top:16px">
      <button class="action-btn" onclick="closeReview()">Esci</button>
      ${answered ? `<button class="action-btn primary" onclick="${rState.i<rState.items.length-1?'reviewNext()':'reviewFinish()'}">${rState.i<rState.items.length-1?'Prossima →':'Vedi risultato →'}</button>` : ''}
    </div>
  </div>`;
}
function answerReview(oi){
  rState.ans[rState.i] = oi;
  const q = rState.items[rState.i].q;
  const ex = rState.items[rState.i].ex;
  const correct = oi === q.corretta;
  updateSR(qId(ex.id, rState.items[rState.i].qi), correct);
  trackQuestion();
  addXP(correct?10:2);
  renderReviewOverlay();
  renderRightRail();
}
function reviewNext(){rState.i++;renderReviewOverlay();}
function reviewFinish(){rState.done=true;renderReviewOverlay();if(view==='home')renderHome();}
